name: paper_to_obsidian
description: "Convert academic PDF papers to Obsidian Markdown notes using Nougat OCR."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # File picking
  file_picker: ^8.1.7

  # Settings persistence
  shared_preferences: ^2.5.3

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.4
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
